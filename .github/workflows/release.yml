name: Release

on:
  push:
    tags:
      - "v*"
  # Allows manual triggering from the Actions tab if you ever need it
  workflow_dispatch:

# Required so tauri-action can create the GitHub Release
permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-13 # Intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04 # Linux x86_64 (deb / rpm / AppImage)
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest # Windows x86_64 (msi + nsis)
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Tauri v2 system deps for Linux (webkit 4.1, ayatana indicator, etc.)
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./client/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: ./client
        run: bun install --frozen-lockfile
        
      # # This only exists as a fallback. It will inflate binary size by up to 100MB if enabled
      # # Should only be considered if more media formats are needed. Common media formats like
      # # MP4, MKV, MOV, and WEBM. are supported without it through domain-specific rust crates.
      # 
      # - name: Fetch ffprobe sidecar
      #   shell: bash
      #   working-directory: ./client
      #   env:
      #     TARGET: ${{ matrix.target }}
      #   run: ./scripts/fetch-ffprobe.sh

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./client
          tagName: ${{ github.ref_name }}
          releaseName: "Release ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
