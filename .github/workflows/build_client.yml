# .github/workflows/tauri-release.yml

name: Release Tauri App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository (sparse)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            client
            .github/workflows/tauri-release.yml

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('client/deno.lock') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('client/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI (Cargo)
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Build Tauri release (Deno)
        working-directory: ./client
        run: deno task tauri build
        
      - name: Upload Tauri bundles
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.os }}
          path: client/src-tauri/target/release/bundle/**/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            client/src-tauri/target/release/bundle/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
