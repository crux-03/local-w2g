name: Release Tauri App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write  # Required to create releases and upload assets

jobs:
  # Job 1: Create the release
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Build and upload artifacts per OS
  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            artifact: '*.dmg'
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: '*.AppImage'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: '*.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository (sparse)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            client
            .github/workflows/tauri-release.yml

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            ~/.deno
          key: deno-${{ runner.os }}-${{ hashFiles('client/deno.lock', 'client/package.json') }}
          restore-keys: |
            deno-${{ runner.os }}-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            client/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('client/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI (Cargo)
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install npm dependencies via Deno
        working-directory: ./client
        run: deno install

      - name: Build Tauri release
        working-directory: ./client
        run: cargo tauri build

      - name: Upload final binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: client/src-tauri/target/release/bundle/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
